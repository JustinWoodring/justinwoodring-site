{% extends "base.html" %}
{% block title %}{{ page.title }} — Research — {% endblock title %}
{% block primary_content %}
<section class="page">
  <header class="page-header">
    <div class="page-kicker">{{ page.date | date(format="%B %Y") }} · Research</div>
    <h1 class="page-title">{{ page.title }}</h1>
  </header>

  <article class="content-section">
    {{ page.content | safe }}
  </article>

  <nav class="post-nav">
    <a href="{{ get_url(path='@/research/_index.md') }}">← All research</a>
    <a href="{{ config.base_url }}">Home</a>
  </nav>
</section>
{% endblock primary_content %}
